<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa OpenAI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Consulta geogràfica amb IA</h1>
    </header>
    <main>
      <aside id="sidebar">
        <form id="coords-form">
          <h2>Cercar coordenades</h2>
          <label for="lat-input">Latitud</label>
          <input type="number" id="lat-input" step="any" placeholder="41.3851" required />
          <label for="lng-input">Longitud</label>
          <input type="number" id="lng-input" step="any" placeholder="2.1734" required />
          <button type="submit">Consultar</button>
        </form>
        <section id="history-section">
          <h2>Historial</h2>
          <ul id="history"></ul>
        </section>
      </aside>
      <div id="map"></div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/mapa.js"></script>
    <script src="js/app.js"></script>
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=TU_GOOGLE_MAPS_KEY&callback=initApp"
    ></script>
  </body>
</html>
